services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Crea el esquema la PRIMERA vez que arranca (solo si el volumen está vacío).
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      WA_API_KEY: ${WA_API_KEY}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      # Media saliente del chat (imágenes/archivos que mandan los agentes).
      - uploads:/app/uploads
    # En EasyPanel NO se publican puertos: el dominio se mapea al puerto 3000 del
    # contenedor por la red interna (Domains → Target port 3000). El contenedor ya
    # lo expone vía EXPOSE 3000 en el Dockerfile.
    expose:
      - "3000"

volumes:
  pgdata:
  uploads:
